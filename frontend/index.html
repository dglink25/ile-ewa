<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO de base (remplacés dynamiquement par react-helmet-async) -->
    <title>Ilé Ẹwà — Cercle communautaire</title>
    <meta name="description" content="Ilé Ẹwà est un espace communautaire pour se former, se rencontrer et grandir ensemble." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://portail-ileewa.com/" />

    <!-- Open Graph (réseaux sociaux) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ilé Ẹwà" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:url" content="https://portail-ileewa.com/" />
    <meta property="og:title" content="Ilé Ẹwà — Cercle communautaire" />
    <meta property="og:description" content="Ilé Ẹwà est un espace communautaire pour se former, se rencontrer et grandir ensemble." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ilé Ẹwà — Cercle communautaire" />
    <meta name="twitter:description" content="Ilé Ẹwà est un espace communautaire pour se former, se rencontrer et grandir ensemble." />

    <!-- Sitemap & indexation -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Applique le thème avant le rendu pour éviter le flash -->
    <script>
      (function () {
        const saved = localStorage.getItem('ile-ewa-theme') || 'system';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const resolved = saved === 'system' ? (prefersDark ? 'dark' : 'light') : saved;
        document.documentElement.setAttribute('data-theme', resolved);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
